name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Markdown Lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: '**/*.md'
          config: '{ "MD013": false, "MD033": false, "MD041": false }'

      - name: Check Dead Links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --exclude 'https://github.com' --exclude 'http://localhost' -- '.'
          fail: true
