name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Markdown Lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: '**/*.md'
          config: '{ "MD013": false, "MD033": false }'

      - name: Check Dead Links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --exclude 'http://localhost' --exclude-path .lycheeignore -- '.'
          fail: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: opensdd-check — Install dependencies
        run: npm ci
        working-directory: opensdd/opensdd-check

      - name: opensdd-check — Lint
        run: npm run lint
        working-directory: opensdd/opensdd-check

      - name: opensdd-check — Format check
        run: npm run format-check
        working-directory: opensdd/opensdd-check

      - name: opensdd-check — Run tests
        run: npm test
        working-directory: opensdd/opensdd-check

      - name: opensdd-check — Coverage
        run: npm run test:coverage
        working-directory: opensdd/opensdd-check
        continue-on-error: true
